<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EXAMEN DE RECUPERACIÓN - DIAGNÓSTICO</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #f59e0b; --text: #e2e8f0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #334155; }
        #timer { text-align: center; font-size: 20px; color: var(--accent); margin-bottom: 20px; font-weight: bold; }
        .pregunta { margin-bottom: 20px; background: #0f172a; padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); }
        input, textarea { width: 95%; margin-top: 10px; padding: 10px; background: #1e293b; border: 1px solid #475569; color: white; border-radius: 4px; }
        button.send { background: #d97706; color: white; border: none; padding: 15px; width: 100%; margin-top: 20px; cursor: pointer; font-size: 16px; border-radius: 6px; }
        button.send:disabled { background: #92400e; cursor: not-allowed; opacity: 0.7; }
        .datos-alumno { margin-bottom: 20px; padding: 15px; background: #334155; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center;">EXAMEN DE RECUPERACIÓN</h1>
        <div id="timer">Cargando tiempo...</div>

        <form id="examenForm">
            <input type="hidden" name="tipo_examen" value="Diagnostico">
            <div class="datos-alumno">
                <label>Nombre del Alumno:</label> <input type="text" name="nombre_alumno" required>
                <label style="margin-top:10px; display:block;">Fecha:</label> <input type="date" name="fecha_examen" required>
            </div>

            <div id="diagnostico">
                <div class="pregunta"><label>1. ¿En qué escala del multímetro colocaría el selector para medir el voltaje de un tomacorriente (CA) de 220V?</label><input type="text" name="d1"></div>
                <div class="pregunta"><label>2. Explique la diferencia fundamental entre Corriente Continua (CC) y Corriente Alterna (CA).</label><textarea name="d2"></textarea></div>
                <div class="pregunta"><label>3. ¿Qué pasos seguiría para verificar si un cable de alimentación está cortado usando la función de continuidad del multímetro?</label><textarea name="d3"></textarea></div>
                <div class="pregunta"><label>4. Ante un sistema operativo lento, ¿qué tres acciones de software recomendaría realizar primero?</label><textarea name="d4"></textarea></div>
                <div class="pregunta"><label>5. ¿Cuál es la diferencia entre un 'Hard Reset' y un 'Factory Reset' en un sistema operativo?</label><textarea name="d5"></textarea></div>
                <div class="pregunta"><label>6. ¿Qué función cumple el comando 'sfc /scannow' en la reparación de Windows?</label><textarea name="d6"></textarea></div>
                <div class="pregunta"><label>7. Si un equipo no arranca pero tiene energía, ¿qué componente mediría primero con el multímetro en la placa base?</label><input type="text" name="d7"></div>
                <div class="pregunta"><label>8. ¿Qué precauciones debe tomar al medir voltaje en una fuente de poder encendida?</label><textarea name="d8"></textarea></div>
                <div class="pregunta"><label>9. ¿Cómo identificaría si una falla de software se debe a un controlador (driver) corrupto?</label><textarea name="d9"></textarea></div>
                <div class="pregunta"><label>10. ¿Por qué es importante descargar la estática antes de tocar componentes internos?</label><input type="text" name="d10"></div>
            </div>

            <button type="button" id="btnEnviar" class="send" onclick="enviarResultados()" disabled>Finalizar y Enviar Resultados</button>
        </form>
    </div>

    <script>
        // Configuración de horario: 16:00 a 18:00 del 23 de junio de 2026
        const horaInicio = new Date("2026-06-23T16:00:00").getTime();
        const horaFin = new Date("2026-06-23T18:00:00").getTime();

        const timerDisplay = document.getElementById('timer');
        const btn = document.getElementById('btnEnviar');

        const x = setInterval(function() {
            const ahora = new Date().getTime();
            const distancia = horaFin - ahora;

            if (ahora < horaInicio) {
                timerDisplay.innerHTML = "El examen comienza a las 16:00";
                btn.disabled = true;
            } else if (distancia < 0) {
                clearInterval(x);
                timerDisplay.innerHTML = "TIEMPO FINALIZADO";
                btn.disabled = true;
            } else {
                const m = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((distancia % (1000 * 60)) / 1000);
                timerDisplay.innerHTML = "Tiempo restante: " + m + "m " + s + "s ";
                btn.disabled = false;
            }
        }, 1000);

        async function enviarResultados() {
            const btn = document.getElementById('btnEnviar');
            const form = document.getElementById('examenForm');
            const formData = new FormData(form);
            
            btn.innerText = "Enviando respuestas...";
            btn.disabled = true;

            try {
                // Envío unificado en un solo paquete
                const params = new URLSearchParams(formData);

                await fetch("https://script.google.com/macros/s/AKfycbzF7NlJXoSt6m9ezJh-qqsMKgjPAdKudjFDQB3M0bDv24d38BRSKZ6RF3mg3hiMNnUqbg/exec", {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: params
                });

                alert("¡Examen de Recuperación enviado con éxito!");
                form.reset();
            } catch (e) {
                alert("Error al enviar: " + e.message);
            } finally {
                btn.innerText = "Finalizar y Enviar Resultados";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
